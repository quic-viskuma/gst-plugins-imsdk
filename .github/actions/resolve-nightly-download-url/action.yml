name: Resolve wrynose nightly build URL
description: >
  Finds the most recent wrynose nightly build and resolves SDK/image artifact URLs
  by checking latest run attempt first, then falling back attempt-by-attempt until
  each artifact URL returns HTTP 200.

inputs:
  token:
    description: GitHub token with read access to qualcomm-linux/meta-qcom
    required: true

outputs:
  sdk-url:
    description: HTTPS download URL for the SDK toolchain .sh installer
    value: ${{ steps.resolve.outputs.sdk-url }}
  image-urls:
    description: >
      JSON object mapping "<target>/<image-type>" to its download URL.
    value: ${{ steps.resolve.outputs.image-urls }}

runs:
  using: composite
  steps:
    - name: Find latest SDK and image URLs from wrynose nightly
      id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        SDK_FILE="qcom-distro-x86_64-qcom-multimedia-proprietary-image-armv8a-qcom-armv8a-toolchain-2.0.sh"
        FILESERVER="https://qli-prod-artifacts.qualcomm.com/qcom-prd-gh-artifacts"
        WORKFLOW_ID="140524224"

        TARGETS=(
          "iq-9075-evk"
          "iq-8275-evk"
          "iq-615-evk"
          "rb3gen2-core-kit"
        )

        url_exists() {
          local URL="$1"
          local STATUS=""

          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" -I "$URL" || true)

          if [ "$STATUS" = "200" ]; then
            return 0
          fi

          # Fallback for S3/file servers where HEAD may not work correctly.
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" -r 0-0 "$URL" || true)

          [ "$STATUS" = "200" ]
        }

        resolve_artifact_url() {
          local RUN_ID="$1"
          local LATEST_ATTEMPT="$2"
          local REL_PATH="$3"
          local LABEL="$4"

          local ATTEMPT="$LATEST_ATTEMPT"

          while [ "$ATTEMPT" -ge 1 ]; do
            local URL="${FILESERVER}/qualcomm-linux/meta-qcom/${RUN_ID}-${ATTEMPT}/${REL_PATH}"

            echo "Checking ${LABEL} at attempt ${RUN_ID}-${ATTEMPT}" >&2
            echo "Candidate URL: ${URL}" >&2

            if url_exists "$URL"; then
              echo "Found ${LABEL} at attempt ${RUN_ID}-${ATTEMPT}" >&2
              echo "$URL"
              return 0
            fi

            ATTEMPT=$((ATTEMPT - 1))
          done

          echo "::error::Unable to find ${LABEL} from attempt ${LATEST_ATTEMPT} down to 1 for run ${RUN_ID}" >&2
          return 1
        }

        RUN_ID=""
        LATEST_ATTEMPT=""
        PAGE=1

        while [ -z "$RUN_ID" ]; do
          echo "Checking workflow runs page: ${PAGE}"

          RUNS=$(gh api \
            "repos/qualcomm-linux/meta-qcom/actions/workflows/${WORKFLOW_ID}/runs?per_page=20&page=${PAGE}" \
            --jq '.workflow_runs[]
              | select(.head_branch=="wrynose")
              | [.id, .run_attempt, .conclusion]
              | @tsv')

          if [ -z "$RUNS" ]; then
            echo "::error::No more wrynose nightly runs found."
            exit 1
          fi

          while IFS=$'\t' read -r _RUN_ID _RUN_ATTEMPT _CONCLUSION; do
            if [ -z "$_RUN_ID" ]; then
              continue
            fi

            if [ "$_CONCLUSION" = "null" ] || [ "$_CONCLUSION" = "cancelled" ]; then
              echo "Skipping run ${_RUN_ID}, conclusion=${_CONCLUSION}"
              continue
            fi

            RUN_ID="$_RUN_ID"
            LATEST_ATTEMPT="$_RUN_ATTEMPT"
            echo "Using latest wrynose run: ${RUN_ID}, latest attempt: ${LATEST_ATTEMPT}"
            break
          done <<< "$RUNS"

          if [ -n "$RUN_ID" ]; then
            break
          fi

          PAGE=$((PAGE + 1))

          if [ "$PAGE" -gt 10 ]; then
            echo "::error::Exhausted 10 pages without finding a usable wrynose run."
            exit 1
          fi
        done

        SDK_REL_PATH="qcom-distro-sdk/qcom-armv8a/${SDK_FILE}"
        SDK_URL=$(resolve_artifact_url "$RUN_ID" "$LATEST_ATTEMPT" "$SDK_REL_PATH" "SDK toolchain")

        echo "sdk-url=${SDK_URL}" >> "$GITHUB_OUTPUT"
        echo "SDK URL: ${SDK_URL}"

        JSON="{"
        SEP=""

        for TARGET in "${TARGETS[@]}"; do
          for TYPE in multimedia proprietary; do
            if [ "$TYPE" = "proprietary" ]; then
              FILENAME="qcom-multimedia-proprietary-image-${TARGET}.rootfs.qcomflash.tar.gz"
            else
              FILENAME="qcom-multimedia-image-${TARGET}.rootfs.qcomflash.tar.gz"
            fi

            REL_PATH="qcom-distro/${TARGET}/${FILENAME}"
            LABEL="${TARGET}/${TYPE}"

            IMAGE_URL=$(resolve_artifact_url "$RUN_ID" "$LATEST_ATTEMPT" "$REL_PATH" "$LABEL")

            echo "Image URL [${LABEL}]: ${IMAGE_URL}"

            JSON="${JSON}${SEP}\"${LABEL}\":\"${IMAGE_URL}\""
            SEP=","
          done
        done

        JSON="${JSON}}"

        echo "image-urls=${JSON}" >> "$GITHUB_OUTPUT"
