name: Resolve wrynose nightly build URL
description: >
  Finds the most recent wrynose nightly build where compile_sdk succeeded
  and outputs the download URL for the qcom-distro SDK toolchain installer.

inputs:
  token:
    description: GitHub token with read access to qualcomm-linux/meta-qcom
    required: true

outputs:
  sdk-url:
    description: HTTPS download URL for the SDK toolchain .sh installer
    value: ${{ steps.resolve.outputs.sdk-url }}

runs:
  using: composite
  steps:
    - name: Find latest SDK from wrynose nightly
      id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        SDK_FILE="qcom-distro-x86_64-qcom-multimedia-proprietary-image-armv8a-qcom-armv8a-toolchain-2.0.sh"
        FILESERVER="https://qli-prod-artifacts.qualcomm.com/qcom-prd-gh-artifacts"
        WORKFLOW_ID="140524224"

        PAGE=1
        SDK_URL=""
        while [ -z "$SDK_URL" ]; do
          RUNS=$(gh api \
            "repos/qualcomm-linux/meta-qcom/actions/workflows/${WORKFLOW_ID}/runs?per_page=20&page=${PAGE}" \
            --jq '.workflow_runs[] | select(.head_branch=="wrynose") | [.id, .run_attempt, .conclusion] | @tsv')
          if [ -z "$RUNS" ]; then
            echo "::error::No more wrynose nightly runs to check — compile_sdk never succeeded." >&2
            exit 1
          fi
          while IFS=$'\t' read -r RUN_ID RUN_ATTEMPT RUN_CONCLUSION; do
            if [ "$RUN_CONCLUSION" = "null" ] || [ "$RUN_CONCLUSION" = "cancelled" ]; then
              continue
            fi
            SDK_JOB_CONCLUSION=$(gh api \
              "repos/qualcomm-linux/meta-qcom/actions/runs/${RUN_ID}/jobs?per_page=100" \
              --jq '.jobs[] | select(.name | contains("compile_sdk")) | .conclusion' 2>/dev/null || true)
            if [ "$SDK_JOB_CONCLUSION" = "success" ]; then
              SDK_URL="${FILESERVER}/qualcomm-linux/meta-qcom/${RUN_ID}-${RUN_ATTEMPT}/qcom-distro-sdk/qcom-armv8a/${SDK_FILE}"
              echo "Resolved SDK from nightly run ${RUN_ID}-${RUN_ATTEMPT}: ${SDK_URL}"
              break
            fi
          done <<< "$RUNS"
          [ -n "$SDK_URL" ] && break
          PAGE=$((PAGE + 1))
          if [ "$PAGE" -gt 10 ]; then
            echo "::error::Exhausted 10 pages of wrynose nightly runs without finding a successful compile_sdk." >&2
            exit 1
          fi
        done

        echo "sdk-url=${SDK_URL}" >> "$GITHUB_OUTPUT"
